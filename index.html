<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoT Decoder - G3CD Matcher</title>
    <style>
        :root {
            --accent: #00ff88;
            --bg: #0b0b0b;
            --card: #151515;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            width: 95%;
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
            background: #222;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            align-items: end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-tag {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
        }

        #themeSelect {
            width: 100%;
            background: #000;
            color: var(--accent);
            border: 2px solid #444;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        /* Database Results Section */
        .db-match-box {
            background: #1a2a1a;
            border: 1px solid #444;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .db-match-box.active {
            border: 2px solid var(--accent);
            border-left: 10px solid var(--accent);
            background: #0d1a11;
        }

        .match-title {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 10px;
        }

        .match-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent);
            font-weight: bold;
            text-decoration: none;
            word-break: break-all;
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .match-link:hover {
            background: var(--accent);
            color: #000;
        }

        .no-match {
            color: #666;
            font-style: italic;
        }

        canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="status-bar">
            <div class="input-group">
                <span class="info-tag">1. Layout Screenshot</span>
                <input type="file" id="upload" accept="image/*">
            </div>

            <div class="input-group">
                <span class="info-tag">2. Active Theme</span>
                <select id="themeSelect">
                    <option value="auto">Auto-Detect</option>
                </select>
            </div>
        </div>

        <div id="dbMatch" class="db-match-box">
            <div id="matchStatus" class="no-match">Upload a layout to check the database...</div>
            <div id="matchInfo" class="match-title"></div>
            <a id="matchLink" href="#" target="_blank" class="match-link hidden">VIEW SOLUTION ON G3CD</a>
        </div>

        <div id="results" class="hidden">
            <canvas id="mainCanvas"></canvas>

    </div>

        const upload = document.getElementById('upload');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const themeSelect = document.getElementById('themeSelect');
        let currentImage = null;

        THEMES.forEach((t, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = t.name;
            themeSelect.appendChild(opt);
        });

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImage = new Image();
                currentImage.onload = () => {
                    document.getElementById('results').classList.remove('hidden');
                    themeSelect.value = "auto";
                    const detectedIdx = autoDetect(currentImage);
                    themeSelect.value = detectedIdx;
                    runAnalysis(currentImage, THEMES[detectedIdx]);
                };
                currentImage.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        themeSelect.addEventListener('change', () => {
            if (!currentImage) return;
            if (themeSelect.value === "auto") themeSelect.value = autoDetect(currentImage);
            runAnalysis(currentImage, THEMES[themeSelect.value]);
        });

        function dist(rgb1, rgb2) {
            return Math.sqrt((rgb1[0] - rgb2[0]) ** 2 + (rgb1[1] - rgb2[1]) ** 2 + (rgb1[2] - rgb2[2]) ** 2);
        }

        function hexToRgb(hex) {
            return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
        }

        function autoDetect(img) {
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const samples = [];
            for (let y = Math.floor(canvas.height * 0.25); y < canvas.height * 0.75; y += 15) {
                for (let x = Math.floor(canvas.width * 0.25); x < canvas.width * 0.75; x += 15) {
                    const i = (y * canvas.width + x) * 4;
                    samples.push([data[i], data[i + 1], data[i + 2]]);
                }
            }
            let bestIdx = 0; let highscore = -1;
            THEMES.forEach((theme, idx) => {
                const target = hexToRgb(theme.solid);
                let score = 0;
                samples.forEach(s => {
                    const d = dist(s, target);
                    if (d < 50) score += (50 - d);
                });
                if (score > highscore) { highscore = score; bestIdx = idx; }
            });
            return bestIdx;
        }

        function runAnalysis(img, theme) {
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const bRGB = hexToRgb(theme.border);
            const sRGB = hexToRgb(theme.solid);

            let walls = []; let lowestY = 0;
            for (let y = 40; y < canvas.height - 40; y += 4) {
                for (let x = 40; x < canvas.width - 40; x += 4) {
                    const i = (y * canvas.width + x) * 4;
                    if (dist([data[i], data[i + 1], data[i + 2]], bRGB) < theme.bT) {
                        walls.push({ x, y }); if (y > lowestY) lowestY = y;
                    }
                }
            }

            if (walls.length < 10) {
                document.getElementById('matchStatus').innerText = "ERROR: BORDERS NOT DETECTED";
                return;
            }

            const minX = Math.min(...walls.map(p => p.x)), maxX = Math.max(...walls.map(p => p.x));
            const gridW = maxX - minX, gridH = gridW * (4 / 7), minY = lowestY - gridH;
            const tW = gridW / 7, tH = gridH / 4;

            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 0.5; ctx.drawImage(img, 0, 0); ctx.globalAlpha = 1.0;

            let binary = "";
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 7; c++) {
                    const sX = Math.floor(minX + (c * tW) + (tW * 0.04)), eX = Math.floor(minX + ((c + 1) * tW) - (tW * 0.04));
                    const sY = Math.floor(minY + (r * tH) + (tH * 0.04)), eY = Math.floor(minY + ((r + 1) * tH) - (tH * 0.04));
                    let matches = 0, total = 0;
                    for (let py = sY; py < eY; py += 2) {
                        for (let px = sX; px < eX; px += 2) {
                            total++;
                            const pi = (py * canvas.width + px) * 4;
                            if (dist([data[pi], data[pi + 1], data[pi + 2]], sRGB) < theme.sT) matches++;
                        }
                    }
                    const isSolid = (matches / total) >= (theme.fill / 100);
                    binary += isSolid ? "1" : "0";
                    ctx.fillStyle = isSolid ? "rgba(255, 68, 68, 0.4)" : "rgba(0, 255, 136, 0.05)";
                    ctx.fillRect(minX + (c * tW), minY + (r * tH), tW, tH);
                }
            }
            ctx.strokeStyle = theme.border; ctx.lineWidth = 4;
            ctx.strokeRect(minX, minY, gridW, gridH);

            checkDatabase(binary);
        }

        function checkDatabase(binary) {
            const dbBox = document.getElementById('dbMatch');
            const status = document.getElementById('matchStatus');
            const info = document.getElementById('matchInfo');
            const link = document.getElementById('matchLink');

            const match = LAYOUT_DB.find(l => l.binary === binary);

            if (match) {
                dbBox.classList.add('active');
                status.innerText = "MATCH FOUND";
                status.style.color = "var(--accent)";
                info.innerText = `Base ${match.name}`;
                link.href = `https://g3cd.com/base-${match.name}-king-of-thieves-video-solution`;
                link.classList.remove('hidden');
            } else {
                dbBox.classList.remove('active');
                status.innerText = "NO DATABASE MATCH";
                status.style.color = "#ff4444";
                info.innerText = "Unknown Layout: " + binary;
                link.classList.add('hidden');
            }
        }
